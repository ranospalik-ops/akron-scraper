name: Akron Deal Scraper

on:
  schedule:
    - cron: '0 6 * * *'    # 09:00 Israel time daily (UTC+3); 06:00 UTC
  workflow_dispatch:        # manual trigger button in the Actions tab

permissions:
  contents: write           # needed so the run can commit seen_deals.csv back

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests twilio

      - name: Run scraper
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:  ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM:        ${{ secrets.TWILIO_FROM }}
          YOUR_NUMBER:        ${{ secrets.YOUR_NUMBER }}
        run: python scraper.py

      # Commit the updated seen-deals file back to the repo.
      # Persists dedup AND counts as repo activity, stopping GitHub from
      # auto-disabling the daily schedule after 60 days of inactivity.
      # Runs even if the scraper step failed, so dedup is never lost.
      - name: Persist seen deals
        if: always()
        run: |
          git config user.name  "deal-scraper-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain seen_deals.csv)" ]; then
            git add seen_deals.csv
            git commit -m "Update seen deals [skip ci]"
            git push
          else
            echo "No change to seen_deals.csv"
          fi
