name: Akron Deal Scraper

on:
  schedule:
    - cron: '0 6 * * *'    # 09:00 Israel time daily (UTC+3); 06:00 UTC
  workflow_dispatch:        # manual trigger button in the Actions tab

permissions:
  contents: write           # needed so the run can commit seen_deals.csv back

# Prevent two runs from pushing at the same time (a cause of the rejection)
concurrency:
  group: akron-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so rebase/push works cleanly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      # Commit the updated seen-deals file back to the repo.
      # Persists dedup AND counts as repo activity, stopping GitHub from
      # auto-disabling the daily schedule after 60 days of inactivity.
      # Runs even if the scraper step failed, so dedup is never lost.
      - name: Persist seen deals
        if: always()
        run: |
          git config user.name  "deal-scraper-bot"
          git config user.email "bot@users.noreply.github.com"

          # Nothing changed? Skip cleanly.
          if [ -z "$(git status --porcelain seen_deals.csv)" ]; then
            echo "No change to seen_deals.csv"
            exit 0
          fi

          # Stash our one changed file, sync hard to the latest remote main,
          # then re-apply. This can NEVER be 'behind', so the push always
          # fast-forwards. Retry once in case of a concurrent push.
          git add seen_deals.csv
          git stash
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git stash pop || true
          git add seen_deals.csv
          git commit -m "Update seen deals [skip ci]" || { echo "nothing to commit"; exit 0; }

          for i in 1 2 3; do
            if git push origin main; then
              echo "pushed"; exit 0
            fi
            echo "push failed, syncing and retrying ($i)..."
            git fetch origin main
            git rebase origin/main || git rebase --abort
          done
          echo "could not push after retries"
          exit 1
